syntax = "proto3";

service CustomerService {

    rpc getAll (Empty) returns (CustomerList);
    rpc getCustomer (CustomerId) returns (Customer);
    rpc addCustomer (Customer) returns (Customer);
    rpc update (Customer) returns (Customer);
    rpc delete (CustomerId) returns (Empty);

}

message Empty {}

message CustomerId {
    string id = 1;
}

message CustomerList {
    repeated Customer customers = 1;
}

message Customer {
    string id=1;
    string name = 2;
    string email = 3;
    string phone = 4;
    string city = 5;
    int32 age = 6;
}